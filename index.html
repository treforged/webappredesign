<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />

    <!-- Primary -->
    <title>Forged — Personal Finance, Engineered</title>
    <meta name="description" content="Budget with precision. Eliminate debt. Stack savings. Forged is the financial cockpit for people who take their money seriously." />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="application-name" content="Forged" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Forged" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:description" content="Budget with precision. Eliminate debt. Stack savings. Track every goal." />
    <meta property="og:site_name" content="Forged" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Forged — Personal Finance, Engineered" />
    <meta name="twitter:description" content="Budget with precision. Eliminate debt. Stack savings. Track every goal." />

    <!-- Fonts — non-blocking so WKWebView renders immediately -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
